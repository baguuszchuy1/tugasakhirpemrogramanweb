<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubungi Saya Cuy</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-blue-200 text-gray-800 font-sans antialiased min-h-screen flex flex-col">
    <nav class="bg-blue-900 text-white py-12 px-8 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="font-bold text-3xl hover:text-blue-200 transition">HALAMAN UTAMA</a>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto p-6 mt-6 w-full">
        <section class="mb-10">
            <h3 class="text-2xl font-bold text-blue-800 mb-4 text-center">Tentang Saya</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                <img src="cihuy/Mikrotik LO.jpg" class="w-full h-auto rounded-lg shadow-md object-cover">
                <img src="cihuy/Nugas Bareng.jpg" class="w-full h-auto rounded-lg shadow-md object-cover">
                <img src="cihuy/Steling.jpg" class="w-full h-auto rounded-lg shadow-md object-cover">
            </div>
        </section>

        <div class="bg-blue-50 p-8 rounded-lg shadow-lg max-w-2xl mx-auto border border-gray-100">
            <h1 class="text-3xl font-extrabold text-blue-900 mb-6 text-center border-b-2 pb-4">Hubungi Saya</h1>
            <form action="" method="post" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                    <input type="text" name="nama" placeholder="Masukkan nama Anda" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">        
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Alamat Email</label>
                    <input type="email" name="email" placeholder="contoh@email.com" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Perusahaan / Instansi</label>
                    <input type="text" name="perusahaan" placeholder="Nama Perusahaan" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nomor Telepon</label>
                    <input type="tel" name="telepon" placeholder="08xxxxxxxxxx" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Pesan</label>
                    <textarea name="pesan" placeholder="Tulis pesan Anda di sini..." class="w-full px-4 py-2 border border-gray-300 rounded-md h-32 resize-y focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"></textarea>
                </div>

                <div class="pt-2">
                    <button type="button" onclick="window.location.href='cihuy.html'" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-4 rounded-md shadow-md transition duration-300 transform hover:-translate-y-0.5">
                        KIRIM PESAN
                    </button>
                </div>        
            </form>
        </div>
    </main>
    
    <footer class="text-center py-6 text-black text-sm mt-auto">
        <p>&copy; 2026 Bagus Arifin <br> Tugas Akhir Pemrograman Web</p>
    </footer>
</body>
</html>
